# New stack: PostgreSQL + Express/TypeScript API + Next.js frontend (frontend-ts).
# Use while migrating off the MySQL + Flask stack (docker-compose.yml).
#
#   docker compose -f docker-compose.postgres.yml up --build
#
# Then load roster data (see backend-ts/README.md “Docker”).
#
# The UI is built with NEXT_PUBLIC_API_URL=http://localhost:5001 so the browser
# (on your machine) talks to the published API port. If you open the app via a
# non-localhost host, rebuild with a matching build arg (see frontend service).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: football_grid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d football_grid"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend-ts:
    build:
      context: ./backend-ts
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://app:apppass@postgres:5432/football_grid
      PORT: "5001"
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend-ts
      dockerfile: Dockerfile
      args:
        # Baked at Next build time — must be reachable from the user’s browser
        NEXT_PUBLIC_API_URL: http://localhost:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend-ts

volumes:
  postgres_data:
